<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Carrito de Compras</title>
<link rel="stylesheet"
href="https://pro.fontawesome.com/releases/v5.10.0/css/all.css">
<link rel="stylesheet" href="../styles.css">
<link rel="stylesheet" href="../estilos/carrito.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css">

</head>

<body>

<header class="main-head">

    <a href="../index.html">
        <img src="../img/logo.jpg" alt="Logo Principal" class="logo">
    </a>

    <nav>

        <div id="mobile">

            <a href="carrito.html">
                <i class="fa fa-shopping-bag"></i>
            </a>

            <i id="bar" class="fas fa-bars"></i>

        </div>

        <ul id="navbar">

            <li><a href="../index.html">Inicio</a></li>

            <li><a href="Tienda.html">Tienda</a></li>

            <li><a href="Productos.html">Productos</a></li>

            <li><a href="Reservas.html">Reservas</a></li>

            <li><a href="Contacto.html">Contacto</a></li>
            
            <li>
                <a href="carrito.html" class="active">
                    <i class="fa fa-shopping-bag"></i>
                </a>
            </li>

            <a href="#" id="close">
                <i class="far fa-times"></i>
            </a>

        </ul>

    </nav>

</header>
       <main class="container my-5">

           <h1 class="text-center mb-5">
                   Mi Carrito
            </h1>

<table class="table table-striped">

<thead>

<tr>

<th>Producto</th>

<th>Precio</th>

<th></th>

</tr>

</thead>

<tbody id="tablaCarrito">

</tbody>

</table>

<div class="text-end">

<h2>

Total:

<span id="total">$0</span>

</h2>

<button
class="btn btn-danger"
onclick="vaciarCarrito()">
Vaciar carrito
</button>
 <a href="Tienda.html" class="btn btn-primary"> Seguir comprando</a>
<button
class="btn btn-success"
onclick="finalizarCompra()">
Finalizar compra
</button>

</div>
<!-- COMPROBANTE DE COMPRA -->

<div id="factura"
style="display:none; margin-top:40px;">

    <div class="card shadow p-4">

        <h2 class="text-success">
            ✅ Compra Confirmada
        </h2>

        <hr>

        <div id="detalleFactura"></div>

        <hr>

        <h3>

            Total:

            <span id="totalFactura"></span>

        </h3>

        <p>

            Gracias por elegir
            <strong>Cabañas del Salado</strong>.

        </p>

    </div>

</div>

</main>
<script src="../js/menu.js"></script>
<script src="../js/carrito.js"></script>

</body>

</html>
