<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../estilos/contacto.css">
    <title>Contacto</title>
</head>

<body>

<main>

<section class="contacto-contenedor">

<h1>Contacto</h1>

<form action="https://formspree.io/f/mjgqlvwr"
      method="POST"
      id="formularioContacto">

    <div class="contacto-grupo">
        <label for="tuNombre">Nombre</label>

        <input
            type="text"
            id="tuNombre"
            name="nombre"
            placeholder="Ingresa tu nombre">

        <small class="texto-error"></small>
    </div>


    <div class="contacto-grupo">
        <label for="tuCorreo">Email</label>

        <input
            type="email"
            id="tuCorreo"
            name="email"
            placeholder="Ingresa tu email">

        <small class="texto-error"></small>
    </div>


    <div class="contacto-grupo">
        <label for="tuMensaje">Mensaje</label>

        <textarea
            id="tuMensaje"
            name="mensaje"
            placeholder="Escribe tu mensaje..."></textarea>

        <small class="texto-error"></small>
    </div>

    <button class="contacto-boton" type="submit">
        Enviar Mensaje
    </button>

</form>

</section>

<div class="mapa">

<iframe
src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d6475.458660244212!2d-58.51532911108736!3d-35.75745699291638!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x9597f1005231461b%3A0x762f37ff3eb5170b!2sAires%20del%20Salado!5e0!3m2!1ses!2sar!4v1778617685515!5m2!1ses!2sar"
width="100%"
height="300"
style="border:0;"
allowfullscreen=""
loading="lazy">
</iframe>

</div>

</main>

<script src="../js/script.js"></script>
<script src="../js/contactoStorage.js"></script>
<script src="../js/contactoValidacion.js"></script>

</body>
</html>
