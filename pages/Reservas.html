<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Reservas | Cabañas del Salado</title>

<link rel="stylesheet" href="../estilos/style.css">
<link rel="stylesheet" href="../estilos/reservas.css">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

</head>

<body>

<header>

<a href="../index.html">
<img src="../img/logo.jpg" class="logo" alt="Logo">
</a>

<nav>

<ul id="navbar">

<li><a href="../index.html">Inicio</a></li>

<li><a href="Productos.html">Productos</a></li>

<li><a href="Tienda.html">Tienda</a></li>

<li><a href="Contacto.html">Contacto</a></li>

<li><a class="active" href="Reservas.html">Reservas</a></li>

</ul>

</nav>

<h1>Reservá tu estadía</h1>

</header>

<main class="container my-5">

<div class="row">

<div class="col-lg-7">

<div class="card shadow p-4">

<h2 class="mb-4">
Datos de la Reserva
</h2>

<div class="mb-3">

<label class="form-label">
Nombre
</label>

<input
type="text"
class="form-control"
id="nombre">

</div>

<div class="mb-3">

<label class="form-label">
Correo
</label>

<input
type="email"
class="form-control"
id="correo">

</div>

<div class="row">

<div class="col-md-6">

<label class="form-label">
Ingreso
</label>

<input
type="date"
id="ingreso"
class="form-control">

</div>

<div class="col-md-6">

<label class="form-label">
Salida
</label>

<input
type="date"
id="salida"
class="form-control">

</div>

</div>

<div class="row mt-3">

<div class="col-md-6">

<label class="form-label">
Cabaña
</label>

<select
id="cabania"
class="form-select">

<option value="85000">
Cabaña 1
</option>

<option value="95000">
Cabaña 2
</option>

</select>

</div>

<div class="col-md-6">

<label class="form-label">
Huéspedes
</label>

<select
class="form-select">

<option>1</option>
<option>2</option>
<option>3</option>
<option>4</option>
<option>5</option>
<option>6</option>

</select>

</div>

</div>

<button
id="calcular"
class="btn btn-success w-100 mt-4">

Calcular Reserva

</button>

</div>

</div>

<div class="col-lg-5">

<div class="card shadow p-4">

<h3>Resumen</h3>

<hr>

<p>

Noches

<strong id="noches">
0
</strong>

</p>

<p>

Subtotal

<strong id="subtotal">
$0
</strong>

</p>

<p class="text-success">

Descuento

<strong id="descuento">
$0
</strong>

</p>

<hr>

<h2>

TOTAL

<span id="total">
$0
</span>

</h2>

<button
class="btn btn-primary w-100 mt-3">

Confirmar Reserva

</button>

</div>

</div>

</div>

</main>

<footer>

<p>

© 2026 Cabañas del Salado

</p>

</footer>

<script src="../js/reservas.js"></script>

</body>

</html>
